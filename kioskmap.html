<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Directory Kiosk</title>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para los íconos (reemplaza a Lucide en versión HTML) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar el código React (JSX) en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        // Initial example data
        const INITIAL_DATA = [
          { id: 1, x: 8.5, y: 13, number: "1431", occupant: "Conference Room", department: "General" },
          { id: 2, x: 92, y: 10, number: "1533", occupant: "Executive Suite", department: "Management" },
          { id: 3, x: 8.5, y: 75, number: "1227", occupant: "John Smith", department: "IT" },
          { id: 4, x: 30, y: 45, number: "1317", occupant: "Sarah Connor", department: "HR" },
        ];

        function App() {
          const [rooms, setRooms] = useState(INITIAL_DATA);
          const [imageSrc, setImageSrc] = useState(null);
          const [scale, setScale] = useState(1);
          const [position, setPosition] = useState({ x: 0, y: 0 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
          
          // Admin / Edit Mode States
          const [editMode, setEditMode] = useState(false);
          const [showAdminControls, setShowAdminControls] = useState(false);
          const [logoClicks, setLogoClicks] = useState(0);

          const [selectedRoom, setSelectedRoom] = useState(null);
          const [searchQuery, setSearchQuery] = useState("");
          const [showModal, setShowModal] = useState(false);
          
          const [formData, setFormData] = useState({ number: '', occupant: '', department: '' });
          const [clickPos, setClickPos] = useState({ x: 0, y: 0 });

          const mapContainerRef = useRef(null);
          const fileInputRef = useRef(null);

          // Auto-cargar imagen desde el repositorio de GitHub si existe
          useEffect(() => {
            const img = new Image();
            img.src = './mapa.jpg';
            img.onload = () => setImageSrc('./mapa.jpg');
          }, []);

          const filteredRooms = useMemo(() => {
            return rooms.filter(room => 
              room.number.toLowerCase().includes(searchQuery.toLowerCase()) ||
              room.occupant.toLowerCase().includes(searchQuery.toLowerCase()) ||
              (room.department && room.department.toLowerCase().includes(searchQuery.toLowerCase()))
            );
          }, [rooms, searchQuery]);

          const handleLogoClick = () => {
            const newCount = logoClicks + 1;
            setLogoClicks(newCount);
            if (newCount >= 5) {
              setShowAdminControls(!showAdminControls);
              setLogoClicks(0);
              if (showAdminControls) setEditMode(false);
            }
          };

          const handleImageUpload = (event) => {
            const file = event.target.files[0];
            if (file) {
              const reader = new FileReader();
              reader.onload = (e) => setImageSrc(e.target.result);
              reader.readAsDataURL(file);
            }
          };

          const handleZoom = (delta) => {
            setScale(prev => Math.min(Math.max(prev + delta, 0.5), 4));
          };

          const handleMapClick = (e) => {
            if (!editMode) {
              if (e.target === e.currentTarget) setSelectedRoom(null);
              return;
            }
            const rect = e.currentTarget.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            setClickPos({ x, y });
            setFormData({ number: '', occupant: '', department: '' });
            setSelectedRoom(null);
            setShowModal(true);
          };

          const handleSaveRoom = (e) => {
            e.preventDefault();
            const newRoom = { id: Date.now(), x: clickPos.x, y: clickPos.y, ...formData };
            setRooms([...rooms, newRoom]);
            setShowModal(false);
          };

          const handleUpdateRoom = (e) => {
            e.preventDefault();
            setRooms(rooms.map(r => r.id === selectedRoom.id ? { ...r, ...formData } : r));
            setShowModal(false);
            setSelectedRoom(null);
          };

          const handleDeleteRoom = (id) => {
            setRooms(rooms.filter(r => r.id !== id));
            setSelectedRoom(null);
            setShowModal(false);
          };

          const startEditRoom = (room) => {
            setSelectedRoom(room);
            setFormData({ number: room.number, occupant: room.occupant, department: room.department });
            setClickPos({ x: room.x, y: room.y });
            setShowModal(true);
          };

          const handleMouseDown = (e) => {
            if (editMode) return;
            setIsDragging(true);
            setDragStart({ x: e.clientX - position.x, y: e.clientY - position.y });
          };

          const handleMouseMove = (e) => {
            if (!isDragging) return;
            setPosition({
              x: e.clientX - dragStart.x,
              y: e.clientY - dragStart.y
            });
          };

          const handleMouseUp = () => setIsDragging(false);

          const exportData = () => {
            const dataStr = JSON.stringify(rooms, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = 'office_map_data.json';
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
          };

          return (
            <div className="flex flex-col h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">
              {/* Top Bar */}
              <header className="bg-white shadow-sm z-20 px-6 py-4 flex items-center justify-between select-none">
                <div className="flex items-center gap-3">
                  <div 
                    onClick={handleLogoClick}
                    className="bg-blue-600 p-2 rounded-lg cursor-pointer active:scale-95 transition-transform"
                    title="Building Directory"
                  >
                    <i className="fas fa-map-marker-alt text-white text-xl"></i>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold text-slate-900">Building Directory</h1>
                    <p className="text-xs text-slate-500">Interactive Floor Plan Kiosk</p>
                  </div>
                </div>

                <div className="flex items-center gap-4">
                  <div className="relative">
                    <i className="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input 
                      type="text" 
                      placeholder="Search office or person..." 
                      className="pl-9 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>
                  
                  {showAdminControls && (
                    <button 
                      onClick={() => setEditMode(!editMode)}
                      className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors ${editMode ? 'bg-amber-100 text-amber-700 border border-amber-200' : 'bg-slate-100 text-slate-600 border border-slate-200 hover:bg-slate-200'}`}
                    >
                      {editMode ? <><i className="fas fa-unlock"></i> Edit Mode ON</> : <><i className="fas fa-lock"></i> Admin Mode</>}
                    </button>
                  )}
                </div>
              </header>

              <div className="flex flex-1 overflow-hidden relative">
                {/* Sidebar */}
                <aside className="w-80 bg-white border-r border-slate-200 overflow-y-auto z-10 shadow-lg hidden md:block flex flex-col h-full">
                  <div className="p-4 border-b border-slate-100">
                    <h2 className="font-semibold text-slate-700">Directory ({filteredRooms.length})</h2>
                  </div>
                  <div className="divide-y divide-slate-100 flex-1 overflow-y-auto">
                    {filteredRooms.length === 0 ? (
                      <div className="p-8 text-center text-slate-400">
                        <i className="fas fa-user text-4xl mx-auto mb-2 opacity-20"></i>
                        <p>No results found</p>
                      </div>
                    ) : (
                      filteredRooms.map(room => (
                        <div 
                          key={room.id} 
                          onClick={() => {
                            setSelectedRoom(room);
                            setPosition({x: 0, y: 0}); 
                          }}
                          className={`p-4 hover:bg-slate-50 cursor-pointer transition-colors ${selectedRoom?.id === room.id ? 'bg-blue-50 border-l-4 border-blue-500' : ''}`}
                        >
                          <div className="flex justify-between items-start">
                            <span className="font-bold text-slate-800 text-lg">#{room.number}</span>
                            <span className="text-xs font-semibold bg-slate-100 px-2 py-0.5 rounded text-slate-500">{room.department || 'General'}</span>
                          </div>
                          <div className="flex items-center gap-2 mt-1 text-slate-600">
                            <i className="fas fa-user text-xs"></i>
                            <span className="text-sm">{room.occupant || "Unassigned"}</span>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                  
                  {showAdminControls && (
                    <div className="p-4 border-t border-slate-100 bg-slate-50">
                      <p className="text-xs font-bold text-slate-400 mb-2 uppercase">Admin Tools</p>
                      <div className="flex gap-2">
                        <button onClick={exportData} className="flex-1 flex items-center justify-center gap-2 px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700 hover:bg-slate-50">
                          <i className="fas fa-download"></i> Export JSON
                        </button>
                        <button onClick={() => fileInputRef.current?.click()} className="flex-1 flex items-center justify-center gap-2 px-3 py-2 bg-white border border-slate-300 rounded-lg text-xs font-medium text-slate-700 hover:bg-slate-50">
                          <i className="fas fa-upload"></i> Upload Map
                        </button>
                        <input type="file" ref={fileInputRef} onChange={handleImageUpload} className="hidden" accept="image/*" />
                      </div>
                    </div>
                  )}
                </aside>

                {/* Main Map Area */}
                <main className="flex-1 relative bg-slate-200 overflow-hidden cursor-move"
                  onMouseDown={handleMouseDown}
                  onMouseMove={handleMouseMove}
                  onMouseUp={handleMouseUp}
                  onMouseLeave={handleMouseUp}
                >
                  <div className="absolute top-4 right-4 z-20 flex flex-col gap-2 bg-white p-1 rounded-lg shadow-md border border-slate-200">
                    <button onClick={() => handleZoom(0.2)} className="w-10 h-10 hover:bg-slate-100 rounded text-slate-600 flex items-center justify-center" title="Zoom In">
                      <i className="fas fa-search-plus"></i>
                    </button>
                    <button onClick={() => handleZoom(-0.2)} className="w-10 h-10 hover:bg-slate-100 rounded text-slate-600 flex items-center justify-center" title="Zoom Out">
                      <i className="fas fa-search-minus"></i>
                    </button>
                    <button onClick={() => { setScale(1); setPosition({x:0, y:0}); }} className="w-10 h-10 hover:bg-slate-100 rounded text-slate-600 flex items-center justify-center" title="Reset View">
                      <i className="fas fa-arrows-alt"></i>
                    </button>
                  </div>

                  <div className="w-full h-full flex items-center justify-center transition-transform duration-100 ease-out origin-center"
                    style={{ transform: `translate(${position.x}px, ${position.y}px) scale(${scale})` }}
                  >
                    {imageSrc ? (
                      <div ref={mapContainerRef} className="relative shadow-2xl bg-white select-none" style={{ cursor: editMode ? 'crosshair' : 'grab' }}>
                        <img src={imageSrc} alt="Floor Plan" className="max-w-none pointer-events-none" style={{ maxHeight: '85vh', display: 'block' }} />
                        
                        <div className="absolute inset-0 z-10" onClick={handleMapClick}>
                          {rooms.map((room) => (
                            <div key={room.id} onClick={(e) => {
                                e.stopPropagation();
                                if (editMode) startEditRoom(room);
                                else setSelectedRoom(room);
                              }}
                              className={`absolute transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center transition-all duration-300
                                ${editMode ? 'hover:scale-125 cursor-pointer' : 'cursor-pointer'}
                                ${selectedRoom?.id === room.id ? 'z-30 scale-125' : 'z-10'}
                              `}
                              style={{ left: `${room.x}%`, top: `${room.y}%` }}
                            >
                              <div className={`relative flex items-center justify-center rounded-full shadow-md border-2 
                                ${selectedRoom?.id === room.id ? 'bg-blue-600 border-white w-8 h-8' : 'bg-white/90 border-blue-500 w-6 h-6 hover:bg-blue-500 hover:border-white'}
                              `}>
                                {selectedRoom?.id === room.id && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>}
                              </div>

                              {!editMode && (
                                <div className={`absolute top-full mt-2 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-xs rounded px-2 py-1 whitespace-nowrap pointer-events-none transition-opacity shadow-lg
                                  ${scale < 0.8 ? 'opacity-0' : 'opacity-100'} 
                                  ${selectedRoom?.id === room.id ? 'opacity-100' : 'group-hover:opacity-100'}
                                `}>
                                  {room.number}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div className="text-center p-12 bg-white rounded-xl shadow-sm border border-slate-200 max-w-md">
                        <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4">
                          <i className="fas fa-upload text-3xl text-blue-500"></i>
                        </div>
                        <h3 className="text-lg font-bold text-slate-800 mb-2">Upload Floor Plan</h3>
                        <p className="text-slate-500 mb-6">Upload the building map image to get started. You can add interactive points in Admin mode.</p>
                        <button onClick={() => fileInputRef.current?.click()} className="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                          Select Image
                        </button>
                      </div>
                    )}
                  </div>
                  
                  {selectedRoom && !editMode && (
                     <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 md:translate-x-0 md:left-6 md:bottom-6 bg-white p-5 rounded-xl shadow-2xl border border-slate-100 w-11/12 max-w-sm z-30">
                       <button onClick={() => setSelectedRoom(null)} className="absolute top-2 right-2 text-slate-400 hover:text-slate-600">
                         <i className="fas fa-times"></i>
                       </button>
                       <div className="flex items-center gap-4 mb-4">
                         <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold text-lg">
                           {selectedRoom.number.substring(0,2)}
                         </div>
                         <div>
                           <h3 className="text-xl font-bold text-slate-800">Office {selectedRoom.number}</h3>
                           <p className="text-blue-600 text-sm font-medium">{selectedRoom.department}</p>
                         </div>
                       </div>
                       <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 mb-3">
                         <p className="text-xs text-slate-500 uppercase font-semibold mb-1">Current Occupant</p>
                         <div className="flex items-center gap-2">
                           <i className="fas fa-user text-slate-400"></i>
                           <span className="font-medium text-slate-700">{selectedRoom.occupant || "Available"}</span>
                         </div>
                       </div>
                       <div className="flex gap-2">
                         <button className="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700">Contact Info</button>
                         {showAdminControls && (
                           <button onClick={() => { setEditMode(true); startEditRoom(selectedRoom); }} className="px-3 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 text-slate-600">
                             <i className="fas fa-pen"></i>
                           </button>
                         )}
                       </div>
                     </div>
                  )}
                </main>
              </div>

              {/* Modal */}
              {showModal && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                      <h3 className="font-bold text-lg text-slate-800">{selectedRoom ? 'Edit Office' : 'New Office'}</h3>
                      <button onClick={() => setShowModal(false)} className="text-slate-400 hover:text-red-500">
                        <i className="fas fa-times"></i>
                      </button>
                    </div>
                    
                    <form onSubmit={selectedRoom ? handleUpdateRoom : handleSaveRoom} className="p-6 space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Office Number</label>
                        <input autoFocus type="text" required className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 1420" value={formData.number} onChange={e => setFormData({...formData, number: e.target.value})} />
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Occupant Name</label>
                        <input type="text" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: John Doe" value={formData.occupant} onChange={e => setFormData({...formData, occupant: e.target.value})} />
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Department</label>
                        <select className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none bg-white" value={formData.department} onChange={e => setFormData({...formData, department: e.target.value})} >
                          <option value="">Select Department...</option>
                          <option value="Management">Management</option>
                          <option value="HR">HR</option>
                          <option value="IT">IT / Tech</option>
                          <option value="Sales">Sales</option>
                          <option value="Finance">Finance</option>
                          <option value="Operations">Operations</option>
                        </select>
                      </div>

                      <div className="pt-4 flex gap-3">
                        {selectedRoom && (
                          <button type="button" onClick={() => handleDeleteRoom(selectedRoom.id)} className="px-4 py-2 border border-red-200 text-red-600 rounded-lg hover:bg-red-50 text-sm font-medium flex items-center gap-2">
                            <i className="fas fa-trash"></i> Delete
                          </button>
                        )}
                        <div className="flex-1 flex gap-3 justify-end">
                          <button type="button" onClick={() => setShowModal(false)} className="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium">Cancel</button>
                          <button type="submit" className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium shadow-sm">Save Changes</button>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
